# Render Shell 없이 운영 DB에 마이그레이션 + 대량 시드 실행
# 사용: Repo → Actions → "Seed oper database (Render)" → Run workflow
# 필수: Settings → Secrets and variables → Actions → Repository secrets → DATABASE_URL
#        (Render Postgres 또는 Web Service에 설정된 값과 동일한 postgres://… URL)

name: Seed oper database (Render)

on:
  workflow_dispatch:
    inputs:
      run_seed_admin:
        description: 'admin001 계정 생성(seed-admin) — 최초 1회 권장, 이미 있으면 갱신만'
        type: boolean
        default: true
      run_migrate:
        description: '마이그레이션 실행 (스키마 최신화)'
        type: boolean
        default: true
      run_seed:
        description: '운영 데모 시드 (seed-oper-april-flow-2026)'
        type: boolean
        default: true
      agent_no:
        description: '중매인 번호 (시드 대상)'
        type: string
        default: 'admin001'

jobs:
  migrate-and-seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require DATABASE_URL secret
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "::error::Repository secret DATABASE_URL is not set. Render → PostgreSQL → External Database URL 을 복사해 GitHub Repo → Settings → Secrets → Actions 에 추가하세요."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run migrations
        if: ${{ inputs.run_migrate }}
        working-directory: server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
        run: npm run migrate

      - name: Seed admin (admin001)
        if: ${{ inputs.run_seed_admin }}
        working-directory: server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
        run: npm run seed-admin

      - name: Seed oper april flow 2026
        if: ${{ inputs.run_seed }}
        working-directory: server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
          SAMPLE_AGENT_NO: ${{ inputs.agent_no }}
        run: npm run seed-oper-april-flow-2026
