# 운영 DB 마이그레이션만 실행 (Shell 불필요)
# Repo → Actions → "Migrate database (Render)" → Run workflow
# Secrets: DATABASE_URL (Render Postgres External URL 권장)

name: Migrate database (Render)

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require DATABASE_URL secret
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "::error::Repository secret DATABASE_URL 이 없습니다. GitHub → Settings → Secrets → Actions 에 추가하세요."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run migrations
        working-directory: server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
        run: npm run migrate
